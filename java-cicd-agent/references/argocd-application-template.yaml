apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: demo-java-service-test
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://git.example.com/team/demo-java-service-gitops.git
    targetRevision: main
    path: apps/test
  destination:
    server: https://kubernetes.default.svc
    namespace: test
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
