apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-java-service
  namespace: test
  labels:
    app: demo-java-service
spec:
  replicas: 1
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: demo-java-service
  template:
    metadata:
      labels:
        app: demo-java-service
    spec:
      containers:
        - name: demo-java-service
          image: __IMAGE__
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: demo-java-service-config
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
